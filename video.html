<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video - Pink Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fff0f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a4a4a;
        }

        header {
            background-color: #ff69b4;
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        nav {
            background-color: #ffb6c1;
            display: flex;
            justify-content: center;
            padding: 10px 0;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            background-color: #ff69b4;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(219, 112, 147, 0.2);
            border: 2px solid #ffc0cb;
        }

        h2 {
            color: #db7093;
            margin-bottom: 20px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Rasio 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            border: 5px solid #ffb6c1;
            background: #000;
        }

        .video-wrapper iframe, 
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .description {
            margin-top: 20px;
            font-style: italic;
            color: #db7093;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #ff69b4;
        }
    </style>
</head>
<body>

    <header>
        <h1>Konten Video</h1>
    </header>

    <nav>
        <a href="index.html">Index</a>
        <a href="biodata.html">Biodata</a>
        <a href="gallery.html">Gallery</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="container">
        <h2>Video Favorit</h2>
        
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <p class="description">
            "Video ini adalah bagian dari dokumentasi tugas pemrograman web saya."
        </p>
    </div>

    <footer>
        &copy; 2026 - Koleksi Video Pink
    </footer>

</body>
</html>
