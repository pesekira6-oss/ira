<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendataan Terintegrasi</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; background: white; padding: 20px; margin: auto; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #007BFF; padding-bottom: 10px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="date"], input[type="number"], input[type="email"], textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .radio-group { display: flex; gap: 15px; }
        .radio-group label { font-weight: normal; }
        button { background-color: #007BFF; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%;}
        button:hover { background-color: #0056b3; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <form id="dataForm">
        
        <h2>Data Demografi</h2>
        <div class="form-group">
            <label>Nama Pengguna:</label>
            <input type="text" name="nama" required>
        </div>
        <div class="form-group">
            <label>Tanggal Lahir:</label>
            <input type="date" name="tanggalLahir" required>
        </div>
        <div class="form-group">
            <label>Alamat:</label>
            <textarea name="alamat" rows="3" required></textarea>
        </div>
        <div class="form-group">
            <label>No Telepon:</label>
            <input type="number" name="telepon" required>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Pendidikan (Ketik untuk mencari):</label>
            <input type="text" list="pendidikanList" name="pendidikan" required>
            <datalist id="pendidikanList">
                <option value="SD">
                <option value="SMP">
                <option value="SMA/SMK">
                <option value="D3">
                <option value="S1">
                <option value="S2">
                <option value="S3">
            </datalist>
        </div>

        <h2>Data Bank</h2>
        <div class="form-group">
            <label>Nama Bank (Ketik untuk mencari):</label>
            <input type="text" list="bankList" name="bank" required>
            <datalist id="bankList">
                <option value="Bank BCA">
                <option value="Bank Mandiri">
                <option value="Bank BNI">
                <option value="Bank BRI">
                <option value="Bank BSI">
                <option value="Bank CIMB Niaga">
                <option value="Bank Permata">
            </datalist>
        </div>
        <div class="form-group">
            <label>Nomor Rekening:</label>
            <input type="number" name="rekening" required>
        </div>

        <h2>Data Transaksi Keuangan</h2>
        <div class="form-group">
            <label>Tanggal Transaksi:</label>
            <input type="date" name="tanggalTransaksi" required>
        </div>
        <div class="form-group">
            <label>Uraian Transaksi:</label>
            <input type="text" name="uraian" required>
        </div>
        <div class="form-group">
            <label>Jenis Transaksi:</label>
            <div class="radio-group">
                <label><input type="radio" name="jenisTransaksi" value="Debet" required> Debet (Uang Keluar)</label>
                <label><input type="radio" name="jenisTransaksi" value="Kredit"> Kredit (Uang Masuk)</label>
            </div>
        </div>
        <div class="form-group">
            <label>Nominal Debet (Kosongkan jika Kredit):</label>
            <input type="number" name="debet">
        </div>
        <div class="form-group">
            <label>Nominal Kredit (Kosongkan jika Debet):</label>
            <input type="number" name="kredit">
        </div>

        <button type="submit" id="submitBtn">Simpan Data</button>
        <div id="message"></div>
    </form>
</div>

<script>
    // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI BAWAH INI
    const scriptURL = 'https://script.google.com/macros/s/AKfycby44LeYvg_mVT9_mFDSriRvb-S1DAUfw7xN4fMmNKHPtnsr7I8bwJCiTACGiEyLCT4glA/exec';
    const form = document.forms['dataForm'];
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('message');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.innerHTML = "Menyimpan...";
        btn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                msg.innerHTML = "Data berhasil disimpan ke Google Sheets!";
                msg.style.color = "green";
                form.reset();
                btn.innerHTML = "Simpan Data";
                btn.disabled = false;
            })
            .catch(error => {
                msg.innerHTML = "Terjadi kesalahan. Coba lagi.";
                msg.style.color = "red";
                console.error('Error!', error.message);
                btn.innerHTML = "Simpan Data";
                btn.disabled = false;
            });
    });
</script>

</body>
</html>
