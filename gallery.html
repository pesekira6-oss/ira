<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Pink Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fff0f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a4a4a;
        }

        header {
            background-color: #ff69b4;
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        nav {
            background-color: #ffb6c1;
            display: flex;
            justify-content: center;
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            background-color: #ff69b4;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: #db7093;
            margin-bottom: 30px;
        }

        /* Layout Grid untuk 3 Foto */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
            border: 2px solid #ffc0cb;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            background-color: #ffe4e1;
        }

        .card p {
            margin-top: 15px;
            font-weight: bold;
            color: #db7093;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #ff69b4;
        }
    </style>
</head>
<body>

    <header>
        <h1>Koleksi Foto</h1>
    </header>

    <nav>
        <a href="index.html">Index</a>
        <a href="biodata.html">Biodata</a>
        <a href="gallery.html">Gallery</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="container">
        <h2>Gallery Saya</h2>
        
        <div class="gallery-grid">
            <div class="card">
                <img src="foto depan.jpeg" alt="Foto 1">
                <p>depan rumah</p>
            </div>

            <div class="card">
                <img src="belakang rumah.jpeg" alt="Foto 2">
                <p>belakang rumah </p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x200/DB7093/ffffff?text=Foto+3" alt="Foto 3">
                <p>Suasana Pantai</p>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 - Koleksi Gallery Pink
    </footer>

</body>
</html>
