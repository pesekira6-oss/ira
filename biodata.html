<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata - Pink Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fff0f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a4a4a;
        }

        header {
            background-color: #ff69b4;
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        /* Navigasi tetap konsisten */
        nav {
            background-color: #ffb6c1;
            display: flex;
            justify-content: center;
            padding: 10px 0;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            background-color: #ff69b4;
        }

        /* Konten Biodata */
        .container {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            border-left: 10px solid #ff69b4;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        h2 {
            color: #db7093;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px dashed #ffb6c1;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table tr td {
            padding: 15px;
            border-bottom: 1px solid #fff0f5;
        }

        .label {
            font-weight: bold;
            color: #ff1493; /* Deep Pink */
            width: 30%;
        }

        .isi {
            color: #555;
        }

        .profile-img {
            display: block;
            margin: 0 auto 20px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #ffb6c1;
            object-fit: cover;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #ff69b4;
        }
    </style>
</head>
<body>

    <header>
        <h1>Profil Saya</h1>
    </header>

    <nav>
        <a href="index.html">Index</a>
        <a href="biodata.html">Biodata</a>
        <a href="gallery.html">Gallery</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="container">
        <h2>Biodata Mahasiswa</h2>
        
        <img src="ira.jpeg" alt="Foto Profil" class="profile-img">

        <table>
            <tr>
                <td class="label">Nama Lengkap</td>
                <td class="isi">: ira</td>
            </tr>
            <tr>
                <td class="label">NIM</td>
                <td class="isi">: 2310715120011</td>
            </tr>
            <tr>
                <td class="label">Jurusan</td>
                <td class="isi">: sosial ekonomi perikanan</td>
            </tr>
            </tr>
            <tr>
                <td class="label">Email</td>
                <td class="isi">: pesekira6@gmail.com</td>
            </tr>
            <tr>
        </table>
    </div>

    <footer>
        &copy; 2026 - Tugas Web Pink
    </footer>

</body>
</html>
